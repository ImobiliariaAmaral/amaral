<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Imobiliária Amaral</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body data-page="vitrine">

  <!-- HEADER -->
  <header class="header-vitrine">
    <div class="container inner">

      <div class="brand">
        <div class="logo">
          <img
            id="brandLogo"
            class="logo-img"
            src="assets/black.jpg"
            data-logo-light="assets/black.jpg"
            data-logo-dark="assets/white.jpg"
            alt="Imobiliária Amaral"
          >
        </div>

        <div class="txt">
          <strong>Amaral Imobiliária</strong>
          <span>CRECI: 48219-J</span>
        </div>
      </div>

      <div class="right">
        <a class="btn btn-outline" href="https://wa.me/5514982104567" target="_blank">
          WhatsApp
        </a>

        <button class="theme-btn" id="themeToggle" type="button">
          🌙
        </button>
      </div>

    </div>
  </header>

  <main class="main">
    <div class="container">

      <!-- FILTROS -->
      <section class="filters">
        <input id="fBusca" placeholder="Buscar..."/>

        <select id="fTipo">
          <option value="todos">Todos</option>
          <option value="casa">Casa</option>
          <option value="apartamento">Apartamento</option>
        </select>
      </section>

      <!-- CARDS -->
      <section id="gridCards" class="grid-cards"></section>

    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalPropOverlay" style="display:none;">
    <div class="modal">
      <div class="mhead">
        <h3>Detalhes</h3>
        <button data-close-modal="prop">X</button>
      </div>
      <div id="modalPropBody"></div>
    </div>
  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      getDocs,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2iHj7C3y9VS07QrbeHQrF6pwsDyTYeJg",
      authDomain: "imobiliaria-amaral1.firebaseapp.com",
      projectId: "imobiliaria-amaral1",
      storageBucket: "imobiliaria-amaral1.firebasestorage.app",
      messagingSenderId: "64993530464",
      appId: "1:64993530464:web:117eb46180abe57add6905",
      measurementId: "G-KQYZTVFZJN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colImoveis = collection(db, "imoveis");

    window.DB = {
      async listImoveis() {
        const snap = await getDocs(colImoveis);
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }
    };
  </script>

  <!-- SCRIPT PRINCIPAL -->
  <script>
    let imoveis = [];

    function getParam() {
      return new URLSearchParams(window.location.search).get("imovel");
    }

    function setParam(id) {
      const url = new URL(window.location);
      url.searchParams.set("imovel", id);
      history.pushState({}, "", url);
    }

    function clearParam() {
      const url = new URL(window.location);
      url.searchParams.delete("imovel");
      history.pushState({}, "", url);
    }

    function abrirCard(id) {
      setParam(id);

      const imv = imoveis.find(i => i.id == id);
      if (!imv) return;

      document.getElementById("modalPropBody").innerHTML = `
        <h2>${imv.titulo || "Imóvel"}</h2>
        <p>${imv.bairro || ""}</p>
        <p>R$ ${imv.preco || ""}</p>
      `;

      document.getElementById("modalPropOverlay").style.display = "flex";
    }

    function fecharModal() {
      clearParam();
      document.getElementById("modalPropOverlay").style.display = "none";
    }

    document.addEventListener("click", e => {
      if (e.target.matches("[data-close-modal='prop']")) {
        fecharModal();
      }
    });

    async function init() {
      imoveis = await window.DB.listImoveis();

      const grid = document.getElementById("gridCards");

      imoveis.forEach(imv => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>${imv.titulo}</h3>
          <p>${imv.bairro}</p>
          <p>R$ ${imv.preco}</p>
        `;
        card.onclick = () => abrirCard(imv.id);
        grid.appendChild(card);
      });

      const id = getParam();
      if (id) abrirCard(id);
    }

    window.addEventListener("popstate", () => {
      const id = getParam();
      if (id) abrirCard(id);
      else fecharModal();
    });

    init();
  </script>

</body>
</html>
