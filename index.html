<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Imobiliária Amaral</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body data-page="vitrine">

    <header class="header-vitrine">
        <div class="container inner">
            <div class="brand" aria-label="Imobiliária Amaral">
                <div class="logo" aria-hidden="true">
                    <img id="brandLogo" class="logo-img" 
                         src="assets/black.jpg" 
                         data-logo-light="assets/black.jpg" 
                         data-logo-dark="assets/white.jpg" 
                         alt="Imobiliária Amaral">
                </div>
                <div class="txt">
                    <strong>Amaral Imobiliária</strong>
                    <span>CRECI: 48219-J</span>
                </div>
            </div>

            <div class="right">
                <a class="btn btn-outline" href="https://wa.me/5514982104567" target="_blank" rel="noopener">
                    WhatsApp
                </a>
                <button class="theme-btn" id="themeToggle" type="button">
                    <span class="theme-ico">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="filters">
                <div class="field-inline">
                    <label for="fBusca">Busca</label>
                    <input id="fBusca"/>
                </div>

                <div class="field-inline">
                    <label for="fTipo">Tipo</label>
                    <select id="fTipo">
                        <option value="todos">Todos</option>
                        <option value="casa">Casa</option>
                        <option value="apartamento">Apartamento</option>
                        <option value="terreno">Terreno</option>
                        <option value="sitio">Sítio</option>
                        <option value="chacara">Chácara</option>
                    </select>
                </div>

                <div class="field-inline">
                    <label for="fPreco">Preço</label>
                    <select id="fPreco">
                        <option value="todos">Todos</option>
                        <option value="200000">Até R$ 200.000</option>
                        <option value="300000">Até R$ 300.000</option>
                        <option value="400000">Até R$ 400.000</option>
                        <option value="500000">Até R$ 500.000</option>
                        <option value="700000">Até R$ 700.000</option>
                        <option value="1000000">Até R$ 1.000.000</option>
                    </select>
                </div>
            </section>

            <section id="gridCards" class="grid-cards"></section>

            <div id="emptyState" class="hidden">
                Nenhum imóvel encontrado.
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalPropOverlay">
        <div class="modal">
            <div class="mhead">
                <h3>Detalhes do Imóvel</h3>
                <button class="xclose" data-close-modal="prop">X</button>
            </div>
            <div class="mbody" id="modalPropBody"></div>
        </div>
    </div>

    <!-- 🔥 NOVO (URL CONTROL) -->
    <script>
      window.getParam = (name) => new URL(window.location).searchParams.get(name);

      window.setParam = (name, value) => {
        const url = new URL(window.location);
        url.searchParams.set(name, value);
        history.replaceState({}, "", url);
      };

      window.removeParam = (name) => {
        const url = new URL(window.location);
        url.searchParams.delete(name);
        history.replaceState({}, "", url);
      };
    </script>

    <script src="./script.js" defer></script>
</body>
</html>
